<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <title>PGM Envanter Sistemi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
<nav class="navbar bg-primary px-3">
  <div class="d-flex align-items-center gap-2 text-white">
    <img src="{{ url_for('static', filename='img/police_logo.png') }}" alt="logo" style="height:32px;">
    <strong>POLİS GENEL MÜDÜRLÜĞÜ – Bilgisayar Kontrol Programı</strong>
  </div>
  {% if current_user.is_authenticated %}
    <div class="text-white">
      {{ current_user.sicil_no }} &nbsp;
      <a class="btn btn-sm btn-light" href="{{ url_for('auth.logout') }}">Çıkış</a>
    </div>
  {% endif %}
</nav>

<div class="container-fluid py-3">   
  {% block content %}{% endblock %}
</div>

<!-- footer -->
<footer class="text-center text-muted py-2 border-top" style="font-size: 13px;">
  Developed by Hüseyin Hacıveli
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
