<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <title>Giriş</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
  <style>
    .eye-btn{ border:none;background:transparent;font-size:1.1rem; }
    .input-group>.form-control{ border-right:0; }
    .input-group-text{ background:#fff; }
  </style>
</head>
<body class="bg-light">
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="text-center mb-3">
        <img src="{{ url_for('static', filename='img/police_logo.png') }}" style="height:80px" alt="Polis Amblemi">
      </div>
      <div class="card shadow-sm">
        <div class="card-body">
          <h5 class="card-title mb-3 text-center">Giriş Yapmak İçin Bilgilerinizi Giriniz</h5>
          {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
              {% for cat,msg in messages %}
                <div class="alert alert-{{cat}} py-2">{{ msg }}</div>
              {% endfor %}
            {% endif %}
          {% endwith %}
          <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="mb-3">
              <label class="form-label">Sicil No</label>
              <div class="input-group">
                <input type="password" class="form-control" name="sicil_no" id="sicil" required>
                <button class="input-group-text eye-btn" type="button" id="toggleS">👁️</button>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">Şifre</label>
              <div class="input-group">
                <input type="password" class="form-control" name="password" id="pwd" required>
                <button class="input-group-text eye-btn" type="button" id="toggleP">👁️</button>
              </div>
            </div>
            <button class="btn btn-primary w-100">Giriş Yap</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
function t(id){ const el=document.getElementById(id); el.type = el.type==='password'?'text':'password'; }
document.getElementById('toggleS').onclick = ()=>t('sicil');
document.getElementById('toggleP').onclick = ()=>t('pwd');
</script>
</body>
</html>
